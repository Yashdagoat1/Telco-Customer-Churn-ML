name: CI Pipeline

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: 3.11

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Check model files exist
        run: |
          if [ ! -f "artifacts/model.pkl" ]; then
            echo "Model file missing!" && exit 1
          fi

      - name: Run app (basic test)
        run: |
          python -m src.app.main & sleep 5